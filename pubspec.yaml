name: legal_hub_app
description: "A legal advice and consultation mobile application."
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  google_sign_in: ^6.0.0

  # UI & Navigation
  curved_navigation_bar: ^1.0.3
  smooth_page_indicator: ^1.1.0
  carousel_slider: ^5.0.0

  # Image Handling
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7

  # Forms & Validation
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.2.0

  # Utilities
  pin_code_fields: ^8.0.1
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/assets/images/
    - lib/assets/icons/
